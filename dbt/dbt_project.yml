name: 'order_to_delivery'
version: '1.0.0'
config-version: 2

profile: 'order_to_delivery'   # must match the name in profiles.yml

model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # dbt build output directory
clean-targets:
  - "target"
  - "dbt_packages"

models:
  order_to_delivery:

    staging:
      +schema: staging
      +materialized: view

    marts:
      +schema: marts
      +materialized: table
