version: 2

models:

  - name: dim_customers
    description: "Dimension table for customers"
    columns:
      - name: customer_id
        description: "Primary key of customer"
        tests:
          - not_null
          - unique

  - name: fact_order_items
    description: "Fact table for order items"

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - order_item_id

    columns:
      - name: order_id
        description: "Order identifier"
        tests:
          - not_null

      - name: order_item_id
        description: "Order item identifier"
        tests:
          - not_null

      - name: customer_id
        description: "Customer identifier"
        tests:
          - not_null

      - name: product_id
        description: "Product identifier"
        tests:
          - not_null


  # =========================
  # 🔥 MARTS (QUAN TRỌNG)
  # =========================

  - name: customer_rfm
    description: "RFM customer segmentation mart"
    columns:
      - name: customer_unique_id
        tests:
          - not_null
          - unique

      - name: customer_segment
        tests:
          - not_null

      - name: recency_days
        tests:
          - not_null

      - name: frequency
        tests:
          - not_null

      - name: monetary
        tests:
          - not_null

      - name: rfm_total_score
        tests:
          - not_null


  - name: kpi_orders
    description: "Monthly KPI summary for orders, revenue, and AOV"
    columns:
      - name: month
        tests:
          - not_null
          - unique

      - name: total_orders
        tests:
          - not_null

      - name: revenue
        tests:
          - not_null

      - name: avg_order_value
        tests:
          - not_null
