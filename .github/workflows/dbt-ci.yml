name: dbt CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: Install packages
        run: |
          dbt deps

      - name: Parse project
        run: |
          dbt parse

      - name: Compile project
        run: |
          dbt compile
