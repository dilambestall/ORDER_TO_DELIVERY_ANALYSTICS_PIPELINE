name: dbt CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: odap
          POSTGRES_PASSWORD: odap
          POSTGRES_DB: odap
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U odap -d odap"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DBT_PROFILES_DIR: dbt
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: odap
      DB_USER: odap
      DB_PASSWORD: odap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres pandas sqlalchemy psycopg2-binary

      - name: Create dbt profiles.yml
        run: |
          cat > dbt/profiles.yml <<'EOF'
          order_to_delivery:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                user: odap
                password: odap
                port: 5432
                dbname: odap
                schema: public
                threads: 4
          EOF

      - name: Install dbt packages
        working-directory: dbt
        run: dbt deps

      - name: Debug dbt connection
        working-directory: dbt
        run: dbt debug

      - name: Load raw data into Postgres
        run: python scripts/load_raw.py

      - name: Run dbt models
        working-directory: dbt
        run: dbt run

      - name: Run dbt tests
        working-directory: dbt
        run: dbt test
